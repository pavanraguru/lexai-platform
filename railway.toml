[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build --filter=@lexai/api"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "lexai-api"

[[services]]
name = "lexai-agent-worker"
startCommand = "node apps/api/dist/jobs/agent.worker.js"

[[services]]
name = "lexai-ocr-worker"
startCommand = "node apps/api/dist/jobs/ocr.worker.js"

[[services]]
name = "lexai-scheduler"
startCommand = "node apps/api/dist/jobs/scheduler.worker.js"
